{% extends "base.html" %}

{% block content %}
    <h1>Record Body Measurement</h1>
    <form action="" method="post" novalidate>
        {{ form.hidden_tag() }}
        <p>
            {{ form.weight.label }}<br>
            {{ form.weight }}
        </p>
        <p>
            {{ form.pulse.label }}<br>
            {{ form.pulse }}
        </p>
        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
